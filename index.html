<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <meta name="theme-color" content="#0c0d11" />
  <title>Orin Builder — AI Website Builder by Orin AI</title>
  <meta name="description" content="Build complete, production-ready websites from a single prompt. Powered by Gemini AI. A sub-product of Orin AI by JN Productions." />
  <meta name="author" content="Januth Nimnal" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://builder.orinai.org/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://builder.orinai.org/" />
  <meta property="og:title" content="Orin Builder — AI Website Builder" />
  <meta property="og:description" content="Describe your website. Orin Builder generates the entire thing — HTML, CSS, JS, DB schema, and live preview." />
  <meta property="og:site_name" content="Orin AI" />

  <!-- Preconnects -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />
  <link rel="dns-prefetch" href="https://firestore.googleapis.com" />

  <!-- Favicon (same as main Orin AI) -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    html,body,#root { height:100%;width:100%;margin:0;padding:0;overflow:hidden; }
    body { font-family:'Plus Jakarta Sans',sans-serif;background:#0c0d11;color:#f1f2f6;-webkit-font-smoothing:antialiased; }
    .dark body { background:#0c0d11;color:#f1f2f6; }
    .no-scrollbar::-webkit-scrollbar { display:none; }
    .no-scrollbar { -ms-overflow-style:none;scrollbar-width:none; }
    .custom-scrollbar { scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent; }
    .custom-scrollbar::-webkit-scrollbar { width:4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1);border-radius:99px; }
  </style>
</head>
<body>
  <div id="root">
    <!-- First-paint shell -->
    <div id="boot-shell" style="display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#0c0d11;">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#22c892" opacity="0.15"/>
        <path d="M12 20h16M20 12v16" stroke="#22c892" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:18px;height:18px;border-radius:50%;border:2px solid rgba(34,200,146,0.2);border-top-color:#22c892;animation:spin 1s linear infinite;"></div>
        <span style="font-size:11px;font-weight:600;letter-spacing:0.1em;color:#686b7e;text-transform:uppercase;">Loading Orin Builder…</span>
      </div>
    </div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <script>
    (() => {
      const RETRY_KEY = 'orin_boot_retry_count';
      const MAX_RETRIES = 2;
      const BOOT_TIMEOUT_MS = 25000;

      const shell = document.getElementById('boot-shell');
      const safeStorage = {
        get(key) {
          try { return sessionStorage.getItem(key); } catch (_) { return null; }
        },
        set(key, value) {
          try { sessionStorage.setItem(key, value); } catch (_) {}
        },
        remove(key) {
          try { sessionStorage.removeItem(key); } catch (_) {}
        },
      };

      const clearClientCaches = async () => {
        try {
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (_) {}
      };

      const unregisterServiceWorkers = async () => {
        try {
          if (!('serviceWorker' in navigator)) return;
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        } catch (_) {}
      };

      const reloadWithBypass = async () => {
        await Promise.all([clearClientCaches(), unregisterServiceWorkers()]);

        const url = new URL(window.location.href);
        url.searchParams.set('boot_retry', String(Date.now()));
        window.location.replace(url.toString());
      };

      const renderBootError = (message) => {
        if (!shell) return;
        shell.innerHTML = `
          <div style="max-width:460px;border:1px solid #1f2130;background:#13141b;border-radius:14px;padding:18px 16px;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;">
            <p style="margin:0 0 8px 0;color:#f1f2f6;font-size:14px;font-weight:600;">Builder failed to start</p>
            <p style="margin:0;color:#686b7e;font-size:12px;line-height:1.45;">${message}</p>
            <button id="boot-retry-btn" style="margin-top:12px;border:1px solid #1f2130;background:#1a1b24;color:#f1f2f6;border-radius:8px;padding:7px 10px;font-size:12px;cursor:pointer;">
              Retry startup
            </button>
          </div>`;
        const btn = document.getElementById('boot-retry-btn');
        btn?.addEventListener('click', () => {
          safeStorage.remove(RETRY_KEY);
          void reloadWithBypass();
        });
      };

      // Warm cleanup in background to avoid stale SW/cache traps.
      void unregisterServiceWorkers();

      window.setTimeout(() => {
        if (window.__orinBooted) {
          safeStorage.remove(RETRY_KEY);
          return;
        }

        const retries = Number(safeStorage.get(RETRY_KEY) || '0');
        if (retries < MAX_RETRIES) {
          safeStorage.set(RETRY_KEY, String(retries + 1));
          void reloadWithBypass();
          return;
        }

        safeStorage.remove(RETRY_KEY);
        renderBootError(window.__orinBootError || 'Startup timed out while loading app bundles.');
      }, BOOT_TIMEOUT_MS);
    })();
  </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
